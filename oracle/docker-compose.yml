name: oracle-mda-sdk-demo

services:
  oracle:
    image: ghcr.io/oracle/adb-free:26.2.4.2-26ai@sha256:7f7938ea0d11b500d427a090a28cc6913789e2a3e455439905b76712315dcd96
    privileged: true
    environment:
      WORKLOAD_TYPE: ATP
      ADMIN_PASSWORD: ${ORACLE_PASSWORD:-Otel1ADebugPassword}
      WALLET_PASSWORD: ${ORACLE_PASSWORD:-Otel1ADebugPassword}
    ports:
      - "15220:1522"
    volumes:
      - oracle-wallets:/u01/app/oracle/wallets
    healthcheck:
      test:
        - CMD-SHELL
        - >
          bash -lc "export TNS_ADMIN=/u01/app/oracle/wallets/tls_wallet;
          printf 'set heading off feedback off pagesize 0\nselect 1 from dual;\nexit\n' |
          sqlplus -L -s ADMIN/$${ADMIN_PASSWORD}@myatp_low |
          grep -Eq '^[[:space:]]*1[[:space:]]*$'"
      interval: 10s
      timeout: 15s
      retries: 90
      start_period: 60s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.153.0@sha256:93aad750175cbf1a973ae1c5886c3371f4d800f61be25cdd26870b8441ffe9fa
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

  app:
    build:
      context: .
    network_mode: "service:oracle"
    depends_on:
      oracle:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      ORACLE_USER: ADMIN
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-Otel1ADebugPassword}
      ORACLE_DATA_SOURCE: myatp_low
      ORACLE_WALLET_SOURCE: /oracle-wallets/tls_wallet
      ORACLE_WALLET_WORKDIR: /tmp/oracle-wallet
      ORACLE_CONNECT_HOST: 127.0.0.1
      ORACLE_CONNECT_PORT: 1522
      CONFIGURE_DB_OBSERVABILITY: "true"
      ORACLE_DATABASE_OPEN_TELEMETRY_TRACING: "true"
      ORACLE_DB_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
      ITERATIONS: 3
      DELAY_SECONDS: 2
      FLUSH_SECONDS: 10
    volumes:
      - oracle-wallets:/oracle-wallets:ro

volumes:
  oracle-wallets:
