file_format: "1.0-rc.1"

tracer_provider:
  processors:
    - batch:
        exporter:
          otlp_http:
            endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT}

instrumentation/development:
  dotnet:
    no_code:
      targets:
        - target:
            assembly:
              name: TestApplication.NoCode
            type: ClassLibrary1.Net8.Class1
            method: Do
            signature:
              return_type: System.Void
              parameter_types:
          span:
             name: Span-Do
             kind: internal
